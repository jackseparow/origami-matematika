<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origami Architect: Fold by Code</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="visual-area">
        <div class="label-info">
            <strong>Preview Origami 3D</strong><br>
            Numerasi: Sudut & Sumbu
        </div>
    </div>
    
    <div id="blockly-area">
        <button id="run-btn" onclick="runCode()">JALANKAN LIPATAN</button>
        <div id="blocklyDiv"></div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Lipatan" colour="160">
            <block type="fold_paper"></block>
        </category>
        <category name="Angka" colour="230">
            <block type="math_number"><field name="NUM">0</field></block>
        </category>
    </xml>

    <script src="blocks.js"></script>
    <script src="origami-engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
